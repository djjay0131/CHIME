name: Build LaTeX and Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'report/**'
      - 'presentation/**'
      - 'site/**'
      - '.github/workflows/build-and-deploy.yml'
      - 'construction/sprints/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build report PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: report

      - name: Build presentation PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: presentation

      - name: Copy PDFs into Hugo static dir
        run: |
          mkdir -p site/static/pdfs
          cp report/main.pdf site/static/pdfs/Jason_Cusati_Project_Part_One.pdf
          cp report/main.pdf site/static/pdfs/report.pdf
          cp presentation/main.pdf site/static/pdfs/presentation.pdf

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: false

      - name: Build Hugo site
        run: hugo --source site/ --minify

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site/public'

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
